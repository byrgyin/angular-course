@if (profile$ | async; as profile) {
  <header class="profile-page__header">
    <app-profile-header
      [profile]="profile"
    ></app-profile-header>
    <a [routerLink]="['/settings']" class="btn to-setting-btn">
      Редактировать
      <svg icon="settings" class="to-setting-icon"></svg>
    </a>
  </header>
  <main class="profile-page__body">
    <app-post-feed></app-post-feed>
    <div>
      <h3 class="h6 mb16">Подписчики</h3>
      <nav class="mb32">
        <ul class="subscriber__list">
          @for (subscriber of subscribers$ | async; track subscriber.id) {
            <li class="subscriber__item">
              <a [routerLink]="['/profile', subscriber.id]" class="subscriber-avatar-btn">
                <img loading="eager" class="subscriber-avatar__img" [src]="subscriber.avatarUrl | imgUrl" alt="">
              </a>
            </li>
          }
          <li>
            <a [routerLink]="['/search']" class="to-subscribers-search"></a>
          </li>
        </ul>
      </nav>

      <h3 class="h6 mb16">Навыки</h3>
      <ul class="stack-wrapper mb32">
        @for (skill of ['123','123','123','123','123','2132']; track skill){
          <li class="skill-tag">{{ skill }}</li>
        }
      </ul>

      <h3 class="h6 mb16">О себе</h3>
      <p class="medium-text">{{ profile.description }}</p>
    </div>
  </main>
}
