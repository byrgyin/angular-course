<img [src]="preview()" alt="">

<div
  dnd
  class="dropzone"
  tabindex="0"
  (keyup.enter)="fileDrop.click()"
  (click)="fileDrop.click()"
  (fileDropped)="onFileDropped($event)"
>

  <div class="dropzone__content">
    <svg icon="upload"></svg>
    <span class="mediim-text">Перетащите изображение или Загрузите</span>
  </div>

  <input
    tabindex="-1"
    class="avatar-input"
    type="file"
    [(ngModel)]="avatar"
    #fileDrop
    (change)="fileBrowserHandler($event)"
  >
</div>
