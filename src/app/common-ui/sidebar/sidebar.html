<img
  src="/assets/svg/logo-small.svg"
  alt=""
  class="ml16 mb20"
>
<nav class="mb20">
  <ul class="main-menu-list">
    @for (item of menuItems; track item) {
      <li>
        <a
          [routerLink]="[item.link]"
          routerLinkActive='active'
          class="menu-item">
          <svg [icon]="item.icon"></svg>
          <span>{{ item.label }}</span>
        </a>
      </li>
    }
  </ul>
</nav>

<p class="medium-text mb20">Подписчики</p>


@for (profile of subscribers$ | async; track profile.id) {
  <app-subscriber-card
    [profile]="profile"
  ></app-subscriber-card>
}

<div class="mb20 to-subscribers">
  <a [routerLink]="['/subscribes']"
     class="to-subscribers-link mediim-text"
  >Все подписчики</a>
  <svg icon="arrow" class="to-subscribers-icon"></svg>
</div>
<footer class="sidebar__footer">
  @if (me(); as me) {
    @if (me.avatarUrl){
      <img [src]="me.avatarUrl | imgUrl" alt="">
    } @else {
      <img src="/assets/images/rayn.png" alt="">
    }
    <div class="medium-text username-text">{{ me.username }}</div>
    <a [routerLink]="['settings']" href="" class="settings-btn">
      <svg icon="settings"></svg>
    </a>
  }
</footer>
